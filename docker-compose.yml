# Project Echo - 核心基础设施编排
# 包含: Redis + Neo4j + MinIO + 数据面(FastAPI) + 控制面(Spring Boot)

networks:
  echo-network:
    driver: bridge
    name: echo-network

volumes:
  neo4j-data:
    name: echo-neo4j-data
  neo4j-logs:
    name: echo-neo4j-logs
  minio-data:
    name: echo-minio-data
  redis-data:
    name: echo-redis-data

services:
  # ─────────────────────────────────────────────
  # Redis 7.x — 任务队列 & 会话缓存
  # ─────────────────────────────────────────────
  redis:
    image: ${DOCKER_REGISTRY_PREFIX:-}redis:7-alpine
    container_name: echo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - echo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Neo4j 5.x Community — 知识图谱数据库
  # ─────────────────────────────────────────────
  neo4j:
    image: ${DOCKER_REGISTRY_PREFIX:-}neo4j:5-community
    container_name: echo-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt 协议
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./infrastructure/neo4j:/docker-entrypoint-initdb.d
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-echo_neo4j_pass}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
    networks:
      - echo-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USERNAME:-neo4j}", "-p", "${NEO4J_PASSWORD:-echo_neo4j_pass}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # MinIO — 本地对象存储（音频/图片/快照）
  # ─────────────────────────────────────────────
  minio:
    image: ${DOCKER_REGISTRY_PREFIX:-}minio/minio:latest
    container_name: echo-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-echo_minio_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-echo_minio_secret}
    command: server /data --console-address ":9001"
    networks:
      - echo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MinIO 初始化 — 创建必要的 bucket
  # ─────────────────────────────────────────────
  minio-init:
    image: ${DOCKER_REGISTRY_PREFIX:-}minio/mc:latest
    container_name: echo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infrastructure/minio/init.sh:/init.sh
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-echo_minio_admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-echo_minio_secret}
    networks:
      - echo-network
    restart: "no"

  # ─────────────────────────────────────────────
  # FastAPI 数据面 — AI 推理服务（端口 8001）
  # ─────────────────────────────────────────────
  data-plane:
    build:
      context: ./data-plane
      dockerfile: Dockerfile
      args:
        # 构建基础镜像（temurin/python）建议直连 Docker Hub，勿用 daocloud 前缀
        REGISTRY_PREFIX: ${DOCKER_BUILD_REGISTRY_PREFIX:-}
    container_name: echo-data-plane
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      # 容器内互联地址固定为 Docker 网络服务名，勿用 .env 中的 localhost
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-echo_minio_admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-echo_minio_secret}
      - MINIO_SECURE=false
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_HOST=http://host.docker.internal:11434
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CONTROL_PLANE_BASE_URL=http://control-plane:8080
      - AUDIO_ENCRYPT_KEY=${AUDIO_ENCRYPT_KEY:-}
      - REDIS_QUEUE_TRANSCRIBE=${REDIS_QUEUE_TRANSCRIBE:-echo:queue:transcribe}
    volumes:
      - ./data-plane:/app
      # 挂载本地模型缓存目录，避免每次重新下载
      - ${MODEL_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - echo-network
    extra_hosts:
      # 允许容器访问宿主机上运行的 Ollama 服务
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # Spring Boot 控制面 — API 网关 & 任务编排（端口 8080）
  # ─────────────────────────────────────────────
  control-plane:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
      args:
        # 构建基础镜像（temurin/python）建议直连 Docker Hub，勿用 daocloud 前缀
        REGISTRY_PREFIX: ${DOCKER_BUILD_REGISTRY_PREFIX:-}
    container_name: echo-control-plane
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_QUEUE_TRANSCRIBE=${REDIS_QUEUE_TRANSCRIBE:-echo:queue:transcribe}
      - REDIS_QUEUE_SUMMARIZE=${REDIS_QUEUE_SUMMARIZE:-echo:queue:summarize}
      - REDIS_QUEUE_EMBED=${REDIS_QUEUE_EMBED:-echo:queue:embed}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-echo_neo4j_pass}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-echo_minio_admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-echo_minio_secret}
      - MINIO_SECURE=false
      - DATA_PLANE_URL=http://data-plane:8001
      - AUDIO_ENCRYPT_KEY=${AUDIO_ENCRYPT_KEY:-}
      - JWT_ENABLED=${JWT_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:-change_me_to_a_256bit_random_secret_string_for_local_use}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - ECHO_API_KEY=${ECHO_API_KEY:-}
      - P2P_ENABLED=${P2P_ENABLED:-false}
      - P2P_PORT=${P2P_PORT:-9090}
      - P2P_DEVICE_SECRET=${P2P_DEVICE_SECRET:-echo-default-secret}
      - P2P_DEVICE_NAME=${P2P_DEVICE_NAME:-my-echo-device}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      data-plane:
        condition: service_healthy
    networks:
      - echo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
