# ============================================================
# Project Echo — Spring Boot 控制面配置
# 所有敏感值通过环境变量注入，不硬编码在此文件
# ============================================================

spring:
  application:
    name: echo-control-plane

  # ── 文件上传限制 ──────────────────────────────────────────────
  servlet:
    multipart:
      # 单个文件最大 500MB（适配长音频录音）
      max-file-size: 500MB
      # 单次请求最大 500MB
      max-request-size: 500MB

  # ── Neo4j 知识图谱 ────────────────────────────────────────
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:echo_neo4j_pass}

  # ── Redis 任务队列 & 缓存 ──────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # 连接超时 2 秒
      connect-timeout: 2000ms
      # 命令超时 5 秒
      timeout: 5000ms

# ── 服务端口 ────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ── MinIO 本地对象存储 ────────────────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:echo_minio_admin}
  secret-key: ${MINIO_SECRET_KEY:echo_minio_secret}
  secure: ${MINIO_SECURE:false}
  buckets:
    raw-audio: raw-audio
    transcriptions: transcriptions
    memory-cards: memory-cards
    snapshots: snapshots

# ── Echo 业务配置 ──────────────────────────────────────────────
echo:
  # 音频加密配置
  audio:
    # AES-256-GCM 加密密钥（Base64 编码的 32 字节，生产环境必须配置）
    # 生成方式: openssl rand -base64 32
    encrypt-key: ${AUDIO_ENCRYPT_KEY:}
  redis:
    queue:
      transcribe: "${REDIS_QUEUE_TRANSCRIBE:echo:queue:transcribe}"
      summarize: "${REDIS_QUEUE_SUMMARIZE:echo:queue:summarize}"
      embed: "${REDIS_QUEUE_EMBED:echo:queue:embed}"
    result:
      prefix: "echo:result:"
  # 数据面 API 地址（用于健康检查和状态查询）
  data-plane:
    base-url: ${DATA_PLANE_URL:http://localhost:8001}
  # P2P 同步配置（局域网内设备间同步）
  p2p:
    enabled: ${P2P_ENABLED:false}
    port: ${P2P_PORT:9090}
    # 设备身份密钥（用于 P2P 快照签名验证，生产环境必须配置）
    device-secret: ${P2P_DEVICE_SECRET:echo-default-secret}
    device-name: ${P2P_DEVICE_NAME:echo-device}

# ── Actuator 健康检查 ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── 日志 ────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.echo: DEBUG
    org.springframework.data.neo4j: INFO
